---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-patches:
        patterns:
          - "*"
        update-types:
          - patch

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      gomod-patches:
        patterns:
          - "*"
        update-types:
          - patch
